<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Los Dos Amigos Hibachi - Owner + Customer</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Work+Sans:wght@400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
body{background:#0B1220;color:#E8EDF5;font-family:"Work Sans",sans-serif}
.serif{font-family:"Fraunces",serif}
.mono{font-family:"JetBrains Mono",monospace}
.glass{background:rgba(21,30,47,.92);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08)}
.glass-soft{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}
.amber{background:linear-gradient(180deg,#FFB84D 0%,#FF8A2E 100%)}
</style>
</head>
<body>
<div id="app"></div>
<script>
const MENU=[
{id:'h1',n:'Chicken Hibachi',c:'Hibachi',p:13.85,d:'Veg, Onion, Zucchini, Bell Pepper',pop:1},
{id:'h2',n:'Shrimp Hibachi',c:'Hibachi',p:14.45,d:'Garlic butter shrimp',pop:1},
{id:'h3',n:'Beef Hibachi',c:'Hibachi',p:15.75,d:'Angus steak, peppers',pop:1},
{id:'h4',n:'Pork Hibachi',c:'Hibachi',p:13.65,d:'Marinated pork'},
{id:'h5',n:'Fish Filet',c:'Hibachi',p:13.35,d:'White fish, ponzu'},
{id:'h6',n:'Veg Hibachi',c:'Hibachi',p:11.85,d:'Market veg, tofu'},
{id:'hc1',n:'Chicken & Shrimp Combo',c:'Hibachi',p:17.45,d:'Double protein',pop:1},
{id:'f1',n:'Chicken Fajita',c:'Fajitas',p:13.85,d:'Peppers, onions, tortillas',pop:1},
{id:'f2',n:'Beef Fajita',c:'Fajitas',p:16.65,d:'Skirt steak',pop:1},
{id:'f3',n:'Supreme Fajita Mix',c:'Fajitas',p:22.75,d:'Chicken, beef, shrimp, pork'},
{id:'m1',n:'Chicken Mongolian Asparagus',c:'Mongolian',p:14.45,d:'Asparagus, soy glaze',pop:1},
{id:'m2',n:'Beef Mongolian',c:'Mongolian',p:17.35,d:'Flank steak, chili crisp',pop:1},
{id:'m3',n:'Triple Mongolian Feast',c:'Mongolian',p:23.35,d:'Chicken, beef, shrimp'},
{id:'fr1',n:'Chicken Fried Rice',c:'Fried Rice',p:13.65,d:'Wok hei, egg',pop:1},
{id:'fr2',n:'Shrimp Fried Rice',c:'Fried Rice',p:14.85,d:'Garlic shrimp'},
{id:'fr3',n:'Combinacion Fried Rice',c:'Fried Rice',p:18.95,d:'Chicken, pork, shrimp, beef',pop:1},
{id:'lm1',n:'Chicken Lo Mein',c:'Lo Mein',p:13.45,d:'Noodles, veg'},
{id:'lm2',n:'Beef Lo Mein',c:'Lo Mein',p:14.95,d:'Steak, noodles'},
{id:'eb1',n:'Especial Box Chicken',c:'Especial Box',p:13.75,d:'Fried Rice + 2 Gyoza + 2 Crab Rangoon + Free Soda',pop:1},
{id:'eb2',n:'Especial Box Beef',c:'Especial Box',p:15.45,d:'Fried Rice + sides + soda'},
{id:'eb3',n:'Especial Box Shrimp',c:'Especial Box',p:14.35,d:'With free canned soda'},
{id:'a1',n:'Crab Rangoon (6)',c:'Appetizers',p:6.25,d:'Crispy'},
{id:'a2',n:'Fried Gyoza (8)',c:'Appetizers',p:7.25,d:'Pork'},
{id:'a3',n:'Taco Dorados Chicken (6)',c:'Appetizers',p:8.5,d:'Crunchy'},
{id:'d1',n:'Coca Cola Bottle',c:'Drinks',p:3.45,d:'Cold'},
{id:'d2',n:'Sweet Coffee with Milk',c:'Drinks',p:4.25,d:'Mexican style'},
];
let role=localStorage.getItem('role')||'customer';
let cart=JSON.parse(localStorage.getItem('cart')||'[]');
let orders=JSON.parse(localStorage.getItem('orders')||'[]');
let isOpen=localStorage.getItem('isOpen')!=='false';
let filter='All';
let cartOpen=false;
function save(){localStorage.setItem('cart',JSON.stringify(cart));localStorage.setItem('orders',JSON.stringify(orders));localStorage.setItem('role',role);localStorage.setItem('isOpen',isOpen)}
function render(){
document.getElementById('app').innerHTML=`
<div class="max-w-[1200px] mx-auto px-4 py-4">
<div class="glass rounded-full px-4 py-3 flex items-center justify-between">
<div class="flex items-center gap-2"><div class="w-8 h-8 rounded-full amber flex items-center justify-center">🔥</div><div class="serif text-[16px]">LOS DOS AMIGOS</div><div class="mono text-[9px] opacity-50 hidden md:block">MEXICAN x HIBACHI</div></div>
<div class="flex items-center gap-2">
<button onclick="setRole('customer')" class="mono text-[10px] px-4 py-2 rounded-full ${role==='customer'?'bg-[#F5F2EB] text-black font-bold':'glass-soft'}">CUSTOMER</button>
<button onclick="askOwner()" class="mono text-[10px] px-4 py-2 rounded-full ${role==='owner'?'bg-[#F5F2EB] text-black font-bold':'glass-soft'}">OWNER</button>
<button onclick="toggleCart()" class="amber text-black mono text-[11px] px-4 py-2 rounded-full font-bold">${cart.reduce((s,i)=>s+i.qty,0)} CART</button>
</div>
</div>

${role==='customer'?`
<div class="mt-6 grid md:grid-cols-3 gap-4">
<div class="md:col-span-2 glass rounded-[20px] p-6">
<div class="serif text-[36px] leading-[0.9]">Mexican Soul<br><span class="text-[#FFB84D]">Hibachi Fire</span></div>
<div class="mono text-[11px] opacity-60 mt-3">CEL 870 316 0231 • Mustang AR • Open ${isOpen?'Now':'Closed'}</div>
<div class="mt-4 flex gap-2"><span class="mono text-[10px] px-3 py-2 rounded-full glass-soft">🔥 Free soda with Especial Box</span><span class="mono text-[10px] px-3 py-2 rounded-full glass-soft">📍 Live Truck Tracking</span></div>
</div>
<div class="glass rounded-[20px] p-4">
<div class="mono text-[10px] tracking-widest">LIVE TRUCK • ${isOpen?'OPEN':'CLOSED'}</div>
<div class="mt-3 h-[120px] rounded-[12px] bg-[#0F1A2F] border border-white/10 relative overflow-hidden flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-emerald-400 animate-ping absolute top-1/2 left-1/2"></div>
<div class="w-6 h-6 rounded-full amber absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center justify-center text-[12px]">🚚</div>
<div class="absolute bottom-2 left-2 mono text-[9px] bg-black/60 px-2 py-1 rounded-full">Mustang • 12 min away</div>
</div>
<button onclick="alert('Location: Mustang AR\\n870 316 0231')" class="mt-3 w-full h-10 rounded-full glass-soft mono text-[11px]">View Full Map</button>
</div>
</div>

<div class="mt-6 flex gap-2 overflow-x-auto pb-2">
${['All','Hibachi','Fajitas','Mongolian','Fried Rice','Lo Mein','Especial Box','Appetizers','Drinks'].map(c=>`<button onclick="setFilter('${c}')" class="mono text-[11px] px-4 py-2 rounded-full whitespace-nowrap ${filter===c?'bg-[#F5F2EB] text-black font-bold':'glass-soft'}">${c}</button>`).join('')}
</div>

<div class="mt-4 grid md:grid-cols-3 gap-3">
${MENU.filter(m=>filter==='All'||m.c===filter).map(m=>`
<div class="glass rounded-[16px] p-4 flex justify-between">
<div class="flex-1"><div class="mono text-[12px] font-bold">${m.n} ${m.pop?'<span class="text-[#FFB84D]">★</span>':''}</div><div class="mono text-[10px] opacity-50">${m.c} • ${m.d}</div><div class="mono text-[12px] text-[#FFB84D] font-bold mt-1">$${m.p.toFixed(2)}</div></div>
<button onclick="addCart('${m.id}')" class="ml-3 w-9 h-9 rounded-full amber text-black font-bold">+</button>
</div>`).join('')}
</div>

<div class="mt-8 glass rounded-[16px] p-4 mono text-[11px] text-white/60">
📞 CEL 870 316 0231 | Facebook Los Dos Amigos Hibachi | Mon-Fri 8AM-10PM, Sat 8AM-10PM, Sun 10AM-9PM
</div>
`:`
<div class="mt-6 grid md:grid-cols-3 gap-4">
<div class="glass rounded-[20px] p-5"><div class="mono text-[11px]">TODAY</div><div class="serif text-[32px] mt-2">${orders.length} Orders</div><div class="mono text-[11px] opacity-60">$${orders.reduce((s,o)=>s+o.total,0).toFixed(2)} revenue</div>
<div class="mt-4 space-y-2">
<button onclick="isOpen=!isOpen;save();render()" class="w-full h-10 rounded-full ${isOpen?'bg-emerald-500 text-black':'bg-red-500 text-white'} mono text-[11px] font-bold">${isOpen?'OPEN • Click to Close':'CLOSED • Click to Open'}</button>
<button onclick="alert('Live location broadcast ON')" class="w-full h-10 rounded-full glass-soft mono text-[11px]">📡 Broadcast Live Location</button>
</div>
</div>
<div class="md:col-span-2 glass rounded-[20px] p-5">
<div class="mono text-[11px]">INCOMING ORDERS • ${orders.filter(o=>o.status==='pending').length} pending</div>
<div class="mt-4 space-y-2 max-h-[400px] overflow-y-auto">
${orders.length===0?'<div class="mono text-[11px] opacity-40 py-8 text-center">No orders yet • Switch to Customer and place order</div>':orders.map(o=>`
<div class="glass-soft rounded-[12px] p-3">
<div class="flex justify-between"><span class="mono text-[11px] font-bold">#${o.id.slice(-4)} • ${o.status.toUpperCase()}</span><span class="mono text-[11px]">$${o.total.toFixed(2)}</span></div>
<div class="mono text-[10px] opacity-60 mt-1">${o.items.map(i=>i.n+' x'+i.qty).join(', ')}</div>
<div class="mt-2 flex gap-2">
${o.status==='pending'?`<button onclick="updateOrder('${o.id}','accepted')" class="px-3 py-1 rounded-full bg-emerald-500 text-black mono text-[10px]">ACCEPT</button><button onclick="updateOrder('${o.id}','declined')" class="px-3 py-1 rounded-full bg-red-500 text-white mono text-[10px]">DECLINE</button>`:''}
${o.status==='accepted'?`<button onclick="updateOrder('${o.id}','ready')" class="px-3 py-1 rounded-full amber text-black mono text-[10px]">MARK READY</button>`:''}
${o.status==='ready'?`<button onclick="updateOrder('${o.id}','completed')" class="px-3 py-1 rounded-full bg-white text-black mono text-[10px]">COMPLETE</button>`:''}
</div>
</div>`).join('')}
</div>
</div>
</div>
<div class="mt-4 glass rounded-[20px] p-5">
<div class="mono text-[11px]">MENU EDITOR • Click price to edit</div>
<div class="mt-3 grid md:grid-cols-2 gap-2 max-h-[400px] overflow-y-auto">
${MENU.map(m=>`<div class="glass-soft rounded-full px-4 py-2 flex justify-between items-center"><span class="mono text-[10px]">${m.n}</span><span class="mono text-[10px] font-bold text-[#FFB84D]">$${m.p.toFixed(2)}</span></div>`).join('')}
</div>
</div>
`}
</div>

${cartOpen?`
<div class="fixed inset-0 z-50 flex justify-end"><div class="absolute inset-0 bg-black/60" onclick="toggleCart()"></div>
<div class="relative w-full max-w-[380px] h-full glass p-5 flex flex-col">
<div class="flex justify-between"><span class="serif text-[24px]">Cart • ${cart.reduce((s,i)=>s+i.qty,0)}</span><button onclick="toggleCart()" class="w-8 h-8 rounded-full glass-soft">✕</button></div>
<div class="flex-1 overflow-y-auto mt-4 space-y-2">
${cart.length===0?'<div class="mono text-[11px] opacity-40 text-center mt-12">Empty • Add hibachi 🔥</div>':cart.map(c=>`<div class="glass-soft rounded-[12px] p-3 flex justify-between items-center"><div class="mono text-[11px]"><div class="font-bold">${c.n}</div><div class="opacity-60">$${c.p.toFixed(2)}</div></div><div class="flex items-center gap-2"><button onclick="qty('${c.id}',-1)" class="w-6 h-6 rounded-full glass-soft">-</button><span class="mono text-[11px]">${c.qty}</span><button onclick="qty('${c.id}',1)" class="w-6 h-6 rounded-full amber text-black">+</button></div></div>`).join('')}
</div>
<div class="border-t border-white/10 pt-4"><div class="flex justify-between mono text-[12px]"><span>Total</span><span class="text-[#FFB84D] font-bold">$${cart.reduce((s,i)=>s+i.p*i.qty,0).toFixed(2)}</span></div>
<button onclick="checkout()" class="mt-3 w-full h-11 rounded-full amber text-black mono text-[11px] font-bold">CHECKOUT • CALL 870 316 0231</button></div>
</div></div>`:''}
`;
}
function setRole(r){role=r;save();render()}
function askOwner(){let pw=prompt('Owner password:');if(pw==='amigos123'){role='owner';save();render()}else if(pw!==null)alert('Wrong password. Hint: amigos123')}
function setFilter(f){filter=f;render()}
function addCart(id){let m=MENU.find(x=>x.id===id);let c=cart.find(x=>x.id===id);if(c)c.qty++;else cart.push({...m,qty:1});save();render();toggleCart(true)}
function toggleCart(force){if(typeof force==='boolean')cartOpen=force;else cartOpen=!cartOpen;render()}
function qty(id,d){let c=cart.find(x=>x.id===id);if(!c)return;c.qty+=d;if(c.qty<=0)cart=cart.filter(x=>x.id!==id);save();render()}
function checkout(){if(cart.length===0)return;let total=cart.reduce((s,i)=>s+i.p*i.qty,0);let id=Date.now().toString();orders.unshift({id,items:[...cart],total,status:'pending'});cart=[];save();render();alert('Order #'+id.slice(-4)+' placed! $'+total.toFixed(2)+'\\nCall 870 316 0231 for pickup in 12 min');}
function updateOrder(id,status){let o=orders.find(x=>x.id===id);if(o){o.status=status;save();render()}}
render();
</script>
</body>
</html>
